<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calcula IMC</title>
</head>
<body>
    <div class="container">
        <h1>Calculadora de IMC</h1>
        <p>Ingresa tu peso (kg) y altura (m) para calcular tu IMC</p>
        <div class="input-section">
            <input type="number" id="weight" placeholder="Peso (kg)" step="0.1">
            <input type="number" id="height" placeholder="Altura (m)" step="0.01">
            <button id="calculate">Calcular</button>
        </div>
        <p id="message" class="message"></p>
        <button id="restart" class="restart-btn">Reiniciar</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
